<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Schedule</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #333; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Course Schedule</h1>
    <table>
        <thead>
            <tr>
                <th>Day</th>
                <th>Course Name</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Monday</td>
                <td>Introduction to UI/UX</td>
                <td>09:00 AM - 11:00 AM</td>
            </tr>
            <tr>
                <td>Wednesday</td>
                <td>Advanced HTML5 Structures</td>
                <td>01:00 PM - 03:00 PM</td>
            </tr>
            <tr>
                <td>Friday</td>
                <td>CSS Flexbox & Responsive Layouts</td>
                <td>10:00 AM - 12:00 PM</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
